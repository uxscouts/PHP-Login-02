version: '3.8'
services:
  mysql:
    image: 'mysql:8.0'
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: my_database
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    ports:
      - '3306:3306'
    volumes:
      - 'db_data:/var/lib/mysql'
  backend:
    build: ./backend
    restart: always
    ports:
      - '8000:8000'
    volumes:
      - './backend:/var/www/html'
    depends_on:
      - mysql
  frontend:
    build: ./frontend
    restart: always
    ports:
      - '3000:3000'
    volumes:
      - './frontend:/frontend'
      - /frontend/node_modules
    environment:
      - WATCHPACK_POLLING=true
      - 'VITE_CODESPACE_NAME=${CODESPACE_NAME}'
      - 'VITE_GITHUB_CODESPACES=${GITHUB_CODESPACES}'
    depends_on:
      - backend
volumes:
  db_data: null